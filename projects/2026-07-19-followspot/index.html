<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Followspot · The Surprise Morning Piece</title>
<style>
  html,body{margin:0;height:100%;background:#0a0912;overflow:hidden;touch-action:none}
  canvas{display:block;width:100%;height:100%}
  a.back{
    position:fixed;top:14px;left:14px;z-index:2;
    font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.14em;
    text-transform:uppercase;color:#9d93b8;text-decoration:none;
    padding:6px 10px;border:1px solid rgba(245,236,221,.18);border-radius:99px;
    background:rgba(10,9,18,.55);backdrop-filter:blur(4px);
  }
  a.back:hover{color:#f5ecdd}
</style>
</head>
<body>
<a class="back" href="../../index.html">← cue sheet</a>
<canvas id="c"></canvas>
<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W, H, dpr;
function size(){
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = cv.width  = innerWidth  * dpr;
  H = cv.height = innerHeight * dpr;
}
size(); addEventListener('resize', size);

// Target = pointer; beam eases toward it like a human operator.
let tx = W/2, ty = H/2, bx = W*0.3, by = H*0.4;
function setTarget(x,y){ tx = x*dpr; ty = y*dpr; }
addEventListener('pointermove', e => setTarget(e.clientX, e.clientY));
addEventListener('pointerdown', e => setTarget(e.clientX, e.clientY));

// Dust motes that only glow inside the beam
const motes = Array.from({length:140}, () => ({
  x: Math.random(), y: Math.random(),
  vx:(Math.random()-.5)*.0004, vy:(Math.random()-.5)*.0004,
  r: .6 + Math.random()*1.6
}));

let idle = 0, t = 0;
function frame(){
  t += 0.008;
  // If the pointer rests, the spot wanders — the operator gets bored.
  idle++;
  if(idle > 240){
    tx = W*(0.5 + 0.34*Math.sin(t*0.9));
    ty = H*(0.5 + 0.28*Math.cos(t*0.7));
  }
  // Operator lag: heavier than a cursor, lighter than a truss
  bx += (tx - bx) * 0.045;
  by += (ty - by) * 0.045;

  // Fade the stage (leaves faint trails)
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(10,9,18,0.28)';
  ctx.fillRect(0,0,W,H);

  const R = Math.min(W,H) * 0.16;

  // The pool of light
  ctx.globalCompositeOperation = 'lighter';
  let g = ctx.createRadialGradient(bx,by,0, bx,by,R*2.4);
  g.addColorStop(0,   'rgba(240,190,120,0.55)');
  g.addColorStop(0.35,'rgba(210,140,110,0.20)');
  g.addColorStop(1,   'rgba(120,60,110,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(bx,by,R*2.4,0,7); ctx.fill();

  // Hot center
  g = ctx.createRadialGradient(bx,by,0, bx,by,R*0.7);
  g.addColorStop(0,'rgba(255,236,200,0.85)');
  g.addColorStop(1,'rgba(255,236,200,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(bx,by,R*0.7,0,7); ctx.fill();

  // Dust, visible only near the beam
  for(const m of motes){
    m.x += m.vx; m.y += m.vy;
    if(m.x<0||m.x>1) m.vx*=-1;
    if(m.y<0||m.y>1) m.vy*=-1;
    const mx = m.x*W, my = m.y*H;
    const d = Math.hypot(mx-bx,my-by);
    if(d < R*2){
      const a = (1 - d/(R*2)) * 0.5;
      ctx.fillStyle = `rgba(255,240,210,${a})`;
      ctx.beginPath(); ctx.arc(mx,my,m.r*dpr,0,7); ctx.fill();
    }
  }
  requestAnimationFrame(frame);
}
addEventListener('pointermove', ()=> idle=0);
frame();
</script>
</body>
</html>
