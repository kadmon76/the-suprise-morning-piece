<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fixer · The Surprise Morning Piece</title>
<style>
  html,body{margin:0;height:100%;background:#0c0a08;overflow:hidden;
    -webkit-user-select:none;user-select:none;touch-action:manipulation}
  body{
    font-family:Georgia,'Times New Roman',serif;
    color:#cdbfa8;
  }
  .stage{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;
    background:radial-gradient(ellipse at 50% 30%, rgba(70,50,25,.16), transparent 62%),#0c0a08;
  }
  a.back{
    position:fixed;top:14px;left:14px;z-index:5;
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    color:#71624f;text-decoration:none;
    padding:6px 10px;border:1px solid rgba(205,191,168,.14);border-radius:99px;
    background:rgba(12,10,8,.5);backdrop-filter:blur(4px);
  }
  a.back:hover{color:#cdbfa8}

  .prompt{
    position:fixed;top:0;left:0;right:0;
    text-align:center;padding-top:max(52px, env(safe-area-inset-top) + 38px);
    font-style:italic;letter-spacing:.02em;font-size:14px;color:#71624f;
    pointer-events:none;
  }

  .print{
    position:relative;
    width:min(78vw,300px);
    aspect-ratio:4/5;
    box-shadow:0 18px 40px rgba(0,0,0,.55), 0 0 0 1px rgba(0,0,0,.4);
    border:10px solid #efe6d2;
    border-bottom-width:34px;
    background:#efe6d2;
    touch-action:none;
  }
  canvas{
    display:block;width:100%;height:100%;
  }

  .caption{
    min-height:1.4em;
    text-align:center;font-style:italic;font-size:12.5px;color:#6b5c48;
    opacity:0;transform:translateY(6px);
    transition:opacity .8s ease, transform .8s ease;
    padding:0 12vw;
  }
  .caption.show{opacity:1;transform:none}

  .ledger{
    position:fixed;left:0;right:0;bottom:0;
    padding:0 9vw max(26px, env(safe-area-inset-bottom) + 14px);
    text-align:center;
    opacity:0;transform:translateY(10px);
    transition:opacity .35s ease, transform .35s ease;
    pointer-events:none;
  }
  .ledger.show{opacity:1;transform:none}
  .ledger .line{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:13px;letter-spacing:.02em;color:#a4937a;
    line-height:1.9;
  }
  .ledger .note{
    margin-top:8px;font-style:italic;font-size:12.5px;color:#71624f;
  }

  @media (prefers-reduced-motion: reduce){
    .caption,.ledger{transition:none}
  }
</style>
</head>
<body>
<a class="back" href="../../index.html">← cue sheet</a>
<div class="stage" id="stage">
  <div class="prompt">touch what's missing.</div>
  <div class="print">
    <canvas id="canvas"></canvas>
  </div>
  <div class="caption" id="caption">restored is a generous word.</div>
  <div class="ledger" id="ledger">
    <div class="line" id="ledgerLine"></div>
    <div class="note" id="ledgerNote"></div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('canvas');
  const printEl = document.querySelector('.print');
  const ctx = canvas.getContext('2d');
  const caption = document.getElementById('caption');
  const ledger = document.getElementById('ledger');
  const ledgerLine = document.getElementById('ledgerLine');
  const ledgerNote = document.getElementById('ledgerNote');
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

  let W = 300, H = 375, dpr = 1;
  let patches = [];
  let holding = false;
  let holdTimer = null;
  let holdPatch = null;
  let startX = 0, startY = 0;

  function rand(a, b){ return a + Math.random() * (b - a); }
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function shade(rgb, amt){
    const r = clamp(Math.round(rgb[0] + amt), 0, 255);
    const g = clamp(Math.round(rgb[1] + amt), 0, 255);
    const b = clamp(Math.round(rgb[2] + amt), 0, 255);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  function drawBase(){
    // sepia field
    const bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#d9c9a3');
    bg.addColorStop(1,'#b79c72');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    // head
    const hcx = W*0.5, hcy = H*0.35, hrx = W*0.20, hry = H*0.155;
    const hg = ctx.createRadialGradient(hcx-hrx*0.3, hcy-hry*0.4, 2, hcx, hcy, hrx*1.4);
    hg.addColorStop(0,'#e7d7ae');
    hg.addColorStop(1,'#8f7145');
    ctx.fillStyle = hg;
    ctx.beginPath();
    ctx.ellipse(hcx,hcy,hrx,hry,0,0,Math.PI*2);
    ctx.fill();

    // shoulders
    const sy = hcy + hry*0.85;
    const sg = ctx.createLinearGradient(0,sy,0,H);
    sg.addColorStop(0,'#7c6440');
    sg.addColorStop(1,'#4a3a24');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.moveTo(W*0.5 - hrx*0.9, sy + 8);
    ctx.quadraticCurveTo(W*0.5, sy - 6, W*0.5 + hrx*0.9, sy + 8);
    ctx.lineTo(W*0.94, H+2);
    ctx.lineTo(W*0.06, H+2);
    ctx.closePath();
    ctx.fill();

    // vignette
    const vg = ctx.createRadialGradient(W*0.5,H*0.42,H*0.2,W*0.5,H*0.42,H*0.75);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,'rgba(20,14,6,0.45)');
    ctx.fillStyle = vg;
    ctx.fillRect(0,0,W,H);

    // grain
    for(let i=0;i<420;i++){
      const x = Math.random()*W, y = Math.random()*H;
      const a = Math.random()*0.06;
      ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,240,210,'+a+')' : 'rgba(30,20,8,'+a+')';
      ctx.fillRect(x,y,1,1);
    }

    // scratches
    ctx.strokeStyle = 'rgba(255,246,225,0.18)';
    ctx.lineWidth = 1;
    for(let i=0;i<5;i++){
      const x = rand(0,W);
      ctx.beginPath();
      ctx.moveTo(x, rand(0,H*0.3));
      ctx.lineTo(x + rand(-8,8), rand(H*0.6,H));
      ctx.stroke();
    }
  }

  function sampleColor(x,y){
    const dx = Math.max(0, Math.min(canvas.width-1, Math.round(x*dpr)));
    const dy = Math.max(0, Math.min(canvas.height-1, Math.round(y*dpr)));
    const d = ctx.getImageData(dx,dy,1,1).data;
    return [d[0],d[1],d[2]];
  }

  function makePatches(){
    patches = [];
    const n = 6;
    let tries = 0;
    while(patches.length < n && tries < 400){
      tries++;
      const r = rand(W*0.055, W*0.09);
      const x = rand(r+W*0.08, W - r - W*0.08);
      const y = rand(r+H*0.08, H - r - H*0.1);
      let ok = true;
      for(const p of patches){
        const d = Math.hypot(p.x-x, p.y-y);
        if (d < p.r + r + 6){ ok = false; break; }
      }
      if (ok){
        patches.push({ x, y, r, base: sampleColor(x,y), restored:false, count:0, recipe:null });
      }
    }
  }

  function drawBlankPatch(p){
    ctx.save();
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.closePath(); ctx.clip();
    ctx.fillStyle = '#e9dfc4';
    ctx.fillRect(p.x-p.r-2,p.y-p.r-2,p.r*2+4,p.r*2+4);
    const g = ctx.createRadialGradient(p.x,p.y,p.r*0.55,p.x,p.y,p.r);
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(1,'rgba(70,52,28,0.4)');
    ctx.fillStyle = g;
    ctx.fillRect(p.x-p.r-2,p.y-p.r-2,p.r*2+4,p.r*2+4);
    ctx.restore();
  }

  function makeRecipe(){
    const kinds = ['curve','curve','glow','shadow','fleck'];
    const marks = [];
    const count = 2 + Math.floor(Math.random()*2);
    for(let i=0;i<count;i++){
      marks.push({
        kind: kinds[Math.floor(Math.random()*kinds.length)],
        ang: rand(0, Math.PI*2),
        off: rand(0.15,0.6),
        len: rand(0.3,0.75),
        bend: rand(-0.5,0.5),
        w: rand(1,3),
        tone: rand(-40,30)
      });
    }
    return marks;
  }

  function renderPatch(p, recipe, alpha){
    ctx.save();
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.closePath(); ctx.clip();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = shade(p.base, 0);
    ctx.fillRect(p.x-p.r-2,p.y-p.r-2,p.r*2+4,p.r*2+4);

    recipe.forEach(function(m){
      const cx = p.x + Math.cos(m.ang)*p.r*m.off;
      const cy = p.y + Math.sin(m.ang)*p.r*m.off;
      if (m.kind === 'curve'){
        ctx.strokeStyle = shade(p.base, m.tone);
        ctx.lineWidth = m.w;
        ctx.lineCap = 'round';
        ctx.beginPath();
        const x1 = cx - Math.cos(m.ang)*p.r*m.len*0.5;
        const y1 = cy - Math.sin(m.ang)*p.r*m.len*0.5;
        const x2 = cx + Math.cos(m.ang)*p.r*m.len*0.5;
        const y2 = cy + Math.sin(m.ang)*p.r*m.len*0.5;
        const mx = (x1+x2)/2 + Math.cos(m.ang+Math.PI/2)*p.r*m.bend;
        const my = (y1+y2)/2 + Math.sin(m.ang+Math.PI/2)*p.r*m.bend;
        ctx.moveTo(x1,y1);
        ctx.quadraticCurveTo(mx,my,x2,y2);
        ctx.stroke();
      } else if (m.kind === 'glow'){
        const g = ctx.createRadialGradient(cx,cy,0,cx,cy,p.r*m.len*0.6);
        g.addColorStop(0, shade(p.base, Math.abs(m.tone)+20));
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx,cy,p.r*m.len*0.6,0,Math.PI*2);
        ctx.fill();
      } else if (m.kind === 'shadow'){
        const g = ctx.createRadialGradient(cx,cy,0,cx,cy,p.r*m.len*0.7);
        g.addColorStop(0, shade(p.base, -Math.abs(m.tone)-15));
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx,cy,p.r*m.len*0.7,0,Math.PI*2);
        ctx.fill();
      } else {
        ctx.fillStyle = shade(p.base, m.tone);
        ctx.beginPath();
        ctx.arc(cx,cy,Math.max(1,m.w*0.7),0,Math.PI*2);
        ctx.fill();
      }
    });
    ctx.restore();
  }

  function animate(from, to, ms, onFrame, onDone){
    if (reduced || ms <= 0){
      onFrame(to);
      if (onDone) onDone();
      return;
    }
    const t0 = performance.now();
    function step(now){
      const t = clamp((now - t0) / ms, 0, 1);
      onFrame(from + (to - from) * t);
      if (t < 1){
        requestAnimationFrame(step);
      } else if (onDone){
        onDone();
      }
    }
    requestAnimationFrame(step);
  }

  function restore(p){
    if (p.restored) return;
    const recipe = makeRecipe();
    animate(0, 1, 550, function(a){
      drawBlankPatch(p);
      renderPatch(p, recipe, a);
    }, function(){
      p.restored = true;
      p.recipe = recipe;
      p.count = 1;
      checkComplete();
    });
  }

  function regenerate(p){
    if (!p.restored) return;
    const oldRecipe = p.recipe;
    animate(1, 0, 160, function(a){
      drawBlankPatch(p);
      renderPatch(p, oldRecipe, a);
    }, function(){
      const recipe = makeRecipe();
      animate(0, 1, 420, function(a){
        drawBlankPatch(p);
        renderPatch(p, recipe, a);
      }, function(){
        p.recipe = recipe;
        p.count++;
        refreshLedger();
      });
    });
  }

  function checkComplete(){
    if (patches.every(function(p){ return p.restored; })){
      caption.classList.add('show');
    }
  }

  function totalReconstructions(){
    return patches.reduce(function(s,p){ return s + p.count; }, 0);
  }

  function refreshLedger(){
    if (!holding) return;
    const filled = patches.filter(function(p){ return p.restored; }).length;
    const total = totalReconstructions();
    ledgerLine.innerHTML = 'restored: ' + filled + '/' + patches.length + '<br>reconstructions: ' + total;
    ledgerNote.textContent = total > filled
      ? 'ask twice, get two different answers.'
      : 'each guess, asked for once.';
  }

  function showLedger(){
    holding = true;
    refreshLedger();
    ledger.classList.add('show');
  }
  function hideLedger(){
    holding = false;
    ledger.classList.remove('show');
  }

  function hitTest(x,y){
    for (const p of patches){
      if (Math.hypot(p.x-x, p.y-y) <= p.r * 1.15) return p;
    }
    return null;
  }

  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  printEl.addEventListener('pointerdown', function(e){
    if (e.cancelable) e.preventDefault();
    const pos = getPos(e);
    startX = pos.x; startY = pos.y;
    holdPatch = hitTest(pos.x, pos.y);
    clearTimeout(holdTimer);
    holdTimer = setTimeout(function(){
      if (holdPatch && holdPatch.restored) regenerate(holdPatch);
      showLedger();
    }, 550);
  }, {passive:false});

  printEl.addEventListener('pointerup', function(e){
    clearTimeout(holdTimer);
    if (holding){
      hideLedger();
    } else {
      const pos = getPos(e);
      if (Math.hypot(pos.x-startX, pos.y-startY) < 10){
        const p = hitTest(pos.x, pos.y);
        if (p && !p.restored) restore(p);
      }
    }
  });

  printEl.addEventListener('pointerleave', function(){
    clearTimeout(holdTimer);
    if (holding) hideLedger();
  });
  printEl.addEventListener('pointercancel', function(){
    clearTimeout(holdTimer);
    if (holding) hideLedger();
  });

  function setup(){
    const rect = printEl.getBoundingClientRect();
    W = rect.width; H = rect.height;
    dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    drawBase();
    makePatches();
    patches.forEach(drawBlankPatch);
    caption.classList.remove('show');
  }

  window.addEventListener('resize', function(){
    clearTimeout(window.__fixerResize);
    window.__fixerResize = setTimeout(setup, 200);
  });

  setup();
})();
</script>
</body>
</html>
